name: Generate Professional APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Android APK
        uses: cemcoe/web-to-apk-action@v14
        with:
          app_name: "CyberScore Elite"
          app_id: "com.cybercore.elite"
          build_command: "echo 'Neural Build: Success'"
          web_dir: "public"

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberScore-Elite-APK
          path: ./*.apk
