name: Generate Professional APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'adopt'

      - name: Build with WebView Wrapper
        uses: GearSwin/web-to-apk-action@v1.1.0
        with:
          app_name: "CyberScore Elite"
          app_url: "https://cybercore-elite.vercel.app"
          icon_path: "public/logo512.png"

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v3
        with:
          name: CyberScore-Elite-APK
          path: ./*.apk
