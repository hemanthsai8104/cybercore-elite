name: Generate Professional APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Android APK
        uses: darkshredder/web-to-app-action@main
        with:
          app_name: "CyberScore Elite"
          app_url: "https://cybercore-elite.vercel.app"
          icon_url: "https://raw.githubusercontent.com/hemanthsai8104/cybercore-elite/main/public/logo512.png"

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberScore-Elite-APK
          path: ./*.apk
